<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHINE 2026 行政總管理系統</title>
  <style>
    /* --- 核心品牌色彩與字體 --- */
    :root {
      --shine-lime: #00ff7f; --shine-black: #1a1a1a;
      --shine-bg: #ffffff; --shine-light: #f4f7f5;
      --shine-gray: #d1d1d1; --shine-red: #ff4d4d;
    }
    
    body { 
      font-family: "Inter", "Noto Sans TC", sans-serif; 
      background-color: #f0f0f0; 
      margin: 0; 
      padding: 10px; 
    }

    /* --- 容器與區塊樣式 --- */
    .container {
      max-width: 1300px; margin: 20px auto; background: var(--shine-bg);
      padding: clamp(20px, 4vw, 40px); border: 3px solid var(--shine-black);
      box-shadow: 12px 12px 0px var(--shine-black); box-sizing: border-box;
      position: relative;
    }

    .form-section { 
      border: 2px solid var(--shine-black); 
      padding: 20px; 
      background: var(--shine-light); 
      margin-bottom: 30px; 
    }

    .section-title { 
      display: inline-block; background: var(--shine-black); color: var(--shine-lime); 
      padding: 5px 20px; font-weight: 900; font-size: 1.1em; margin-bottom: 20px; 
      margin-top: -35px; border: 2px solid var(--shine-black); box-shadow: 4px 4px 0px var(--shine-lime);
    }

    /* --- 按鈕與輸入框 --- */
    .btn { 
      padding: 12px 25px; font-weight: 900; border: 2px solid var(--shine-black); 
      cursor: pointer; display: inline-flex; align-items: center; justify-content: center; 
      text-transform: uppercase; text-decoration: none; transition: 0.1s;
      background: white; color: var(--shine-black);
    }
    
    .btn-next { background: var(--shine-black); color: var(--shine-lime); }
    .btn-next:hover { 
      background: var(--shine-lime); color: var(--shine-black); 
      box-shadow: 6px 6px 0px var(--shine-black); transform: translate(-3px, -3px); 
    }

    input, select { 
      border: 2px solid var(--shine-black); padding: 12px; font-size: 16px; 
      width: 100%; box-sizing: border-box; margin-top: 5px; 
    }
    
    label { font-weight: 900; background: var(--shine-lime); padding: 2px 10px; display: inline-block; }

    /* --- 列表卡片樣式 --- */
    .grid-display-area {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      align-content: start;
    }

    .item-card {
      background: var(--shine-bg);
      border: 3px solid var(--shine-black);
      padding: 15px;
      cursor: pointer;
      transition: all 0.1s ease;
      position: relative;
      display: flex;
      flex-direction: column;
      text-align: left;
    }

    .item-card:hover {
      transform: translate(-4px, -4px);
      box-shadow: 8px 8px 0px var(--shine-black);
    }

    .card-header {
      border-bottom: 2px solid var(--shine-black);
      padding-bottom: 10px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-tag { 
      font-size: 11px; padding: 2px 6px; font-weight: 900;
      background: var(--shine-black); color: var(--shine-lime); 
    }

    /* --- 工具類 --- */
    .hidden { display: none !important; }
    .form-group { margin-bottom: 15px; }
    
    .loading-mask {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.8); z-index: 9999;
      display: flex; align-items: center; justify-content: center; font-weight: 900;
    }
  </style>
</head>
<body>

  <div id="loading" class="loading-mask hidden">LOADING...</div>

  <div id="auth-block" class="container" style="max-width: 500px; margin-top: 80px;">
    <div class="section-title">ADMIN AUTH</div>
    <div class="form-section">
      <div class="form-group"><label>ACCOUNT</label><input type="text" id="u_name"></div>
      <div class="form-group"><label>PASSWORD</label><input type="password" id="u_pass"></div>
      <button class="btn btn-next" style="width:100%; margin-top:10px;" onclick="doLogin()">START SESSION</button>
    </div>
  </div>

  <div id="admin-dashboard" class="container hidden">
    <div class="section-title">ADMIN DASHBOARD</div>
    
    <div style="display:flex; gap:10px; margin-bottom:30px; flex-wrap: wrap;">
      <button class="btn btn-next" id="tab-edit" onclick="switchTab('edit')">資料編修</button>
      <button class="btn" id="tab-finance" onclick="switchTab('finance')">繳費登記</button>
    </div>

    <div class="form-section">
      <div class="section-title">快速檢索</div>
      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px;">
        <div>
          <label>關鍵字搜尋</label>
          <input type="text" id="search-input" placeholder="搜尋姓氏、電話、教會..." oninput="handleSearch()">
        </div>
        <div>
          <label>目前筆數</label>
          <div id="stats-count" style="padding:12px; font-weight:900; border:2px solid black; background:white; margin-top:5px; text-align:center;">0</div>
        </div>
      </div>
    </div>

    <div id="member-list-container" class="grid-display-area">
      </div>
  </div>

  <div id="editModal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; padding: 20px 0;">
    <div class="container" style="max-width: 900px; margin: auto;">
      <button onclick="closeModal()" style="position: absolute; right: 20px; top: 20px; background: var(--shine-red); color: white; border: 2px solid black; padding: 5px 15px; cursor: pointer; font-weight:900;">CLOSE X</button>
      <h2 style="text-align: center; font-weight: 900; margin-bottom:30px;">編輯詳細資料</h2>
      <input type="hidden" id="edit-row-index">
      
      <div id="modal-fields-container">
        </div>
      
      <div style="text-align: center; margin-top: 30px;">
        <button class="btn btn-next" onclick="submitEdit()">儲存變更紀錄</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyU-0hGCUkmmu_YGTF80KVLVKZ-hwJUPgGRpz55XRrcH6z8YcVnvdNVDjfnQ9M3NvRL/exec"; 
    let fullData = [];
    let currentTab = 'edit';

    async function api(payload) {
      document.getElementById('loading').classList.remove('hidden');
      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        return await res.json();
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    async function doLogin() {
      const u = document.getElementById('u_name').value;
      const p = document.getElementById('u_pass').value;
      const res = await api({ action: 'login', username: u, password: p });
      if (res.success) {
        sessionStorage.setItem('admin_token', res.token);
        document.getElementById('auth-block').classList.add('hidden');
        document.getElementById('admin-dashboard').classList.remove('hidden');
        fetchData();
      } else { alert("驗證失敗"); }
    }

    async function fetchData() {
      const res = await api({ action: 'fetchAllData', token: sessionStorage.getItem('admin_token') });
      if (res.success) {
        fullData = res.data;
        handleSearch();
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-edit').className = 'btn' + (tab==='edit'?' btn-next':'');
      document.getElementById('tab-finance').className = 'btn' + (tab==='finance'?' btn-next':'');
      handleSearch();
    }

    function handleSearch() {
      const key = document.getElementById('search-input').value.toLowerCase();
      const filtered = fullData.filter(m => 
        (m.name && m.name.toLowerCase().includes(key)) ||
        (m.phone && m.phone.includes(key)) ||
        (m.church && m.church.toLowerCase().includes(key))
      );
      
      const displayData = filtered.slice(0, 50);
      document.getElementById('stats-count').innerText = `${displayData.length} / ${filtered.length}`;
      renderList(displayData);
    }

    function renderList(data) {
      const container = document.getElementById('member-list-container');
      container.innerHTML = data.map(m => {
        const balance = (m.totalDue || 0) - (m.paid || 0) - (m.subsidy || 0);
        return `
          <div class="item-card" onclick="openAction(${m.row})">
            <div class="card-header">
              <strong style="font-size:1.1em;">${m.name}</strong>
              <span class="status-tag">${m.role}</span>
            </div>
            <div style="font-size:14px; font-weight:700;">
              <div>${m.church || '無教會資訊'}</div>
              <div style="margin-top:5px; color:#666;">${m.phone}</div>
              ${currentTab === 'finance' ? `
                <div style="margin-top:10px; border-top:1px dashed black; padding-top:10px; color:${balance <= 0 ? 'green' : 'var(--shine-red)'};">
                  ${balance <= 0 ? '● 已結清' : '○ 欠費：' + balance}
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function closeModal() { document.getElementById('editModal').classList.add('hidden'); }
    
    function openAction(rowId) {
       // 根據 Tab 決定行為... 
       // 目前先測試開啟個資編輯
       document.getElementById('editModal').classList.remove('hidden');
       console.log("正在處理行數：", rowId);
    }
  </script>
</body>
</html>
