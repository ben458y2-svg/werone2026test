<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WE R ONE 2026 報名行政管理後台</title>
  <style>
    /* =========================================
       1. 全域變數與基礎樣式 (與 teamadmin 完全一致)
       ========================================= */
    :root {
      --shine-lime: #00ff7f;
      --shine-black: #1a1a1a;
      --shine-bg: #ffffff;
      --shine-light: #f4f7f5;
      --shine-gray: #d1d1d1;
      --shine-red: #ff4d4d;
      --shine-blue: #3498db;
      --shine-yellow: #fbc02d;
    }

    body {
      font-family: "Inter", "Noto Sans TC", sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      padding: 10px;
    }

    .container {
      max-width: 1300px;
      margin: 20px auto;
      background: var(--shine-bg);
      padding: clamp(20px, 4vw, 40px);
      border: 3px solid var(--shine-black);
      box-shadow: 12px 12px 0px var(--shine-black);
      box-sizing: border-box;
      position: relative;
    }

    /* =========================================
       2. 表單與輸入元件
       ========================================= */
    .form-section {
      border: 2px solid var(--shine-black);
      padding: 20px;
      background: var(--shine-light);
      margin-bottom: 30px;
      position: relative;
    }

    .section-title {
      display: inline-block;
      background: var(--shine-black);
      color: var(--shine-lime);
      padding: 5px 20px;
      font-weight: 900;
      font-size: 1.1em;
      margin-bottom: 20px;
      margin-top: -35px;
      border: 2px solid var(--shine-black);
      box-shadow: 4px 4px 0px var(--shine-lime);
    }

    input, select, textarea {
      border: 2px solid var(--shine-black);
      padding: 12px;
      font-size: 16px;
      width: 100%;
      box-sizing: border-box;
      margin-top: 5px;
    }

    label {
      font-weight: 900;
      background: var(--shine-lime);
      padding: 2px 10px;
    }


    /* =========================================
       3. 按鈕樣式 (與 teamadmin 完全一致)
       ========================================= */
    .btn {
      padding: 12px 25px;
      font-weight: 900;
      border: 2px solid var(--shine-black);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.1s ease;
      font-family: "Inter", "Noto Sans TC", sans-serif;
    }

    .btn-next {
      background: var(--shine-bg);
      color: var(--shine-black);
    }

    .btn-next:hover, .btn-next.active {
      background: var(--shine-black);
      color: var(--shine-lime);
      box-shadow: 6px 6px 0px var(--shine-black);
      transform: translate(-3px, -3px);
    }

    .btn-save-action {
      width: 100%;
      background: var(--shine-red) !important;
      color: white !important;
      border: 2px solid var(--shine-black);
      box-shadow: 6px 6px 0px var(--shine-black);
      font-size: 1.2em;
      font-weight: 900;
      padding: 15px;
      cursor: pointer;
      font-family: "Inter", "Noto Sans TC", sans-serif;
    }

    .btn-save-action:active {
      transform: translate(2px, 2px);
      box-shadow: 4px 4px 0px var(--shine-black);
    }

    /* 批次按鈕 (黃色) */
    .btn-batch {
      background: var(--shine-yellow);
      color: var(--shine-black);
      border: 2px solid var(--shine-black);
      box-shadow: 4px 4px 0px var(--shine-black);
      display: none;
      margin-bottom: 10px;
    }

    .btn-batch:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px var(--shine-black);
    }

    /* =========================================
       4. 分頁標籤 (與 teamadmin btn-next 風格一致)
       ========================================= */
    .tab-container {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 12px 25px;
      font-weight: 900;
      border: 2px solid var(--shine-black);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      transition: all 0.1s ease;
      background: var(--shine-bg);
      color: var(--shine-black);
      font-family: "Inter", "Noto Sans TC", sans-serif;
    }

    .tab-btn:hover, .tab-btn.active {
      background: var(--shine-black);
      color: var(--shine-lime);
      box-shadow: 6px 6px 0px var(--shine-black);
      transform: translate(-3px, -3px);
    }

    /* =========================================
       5. 卡片元件
       ========================================= */
    .item-card {
      background: var(--shine-bg);
      border: 3px solid var(--shine-black);
      padding: 15px;
      cursor: pointer;
      transition: all 0.1s ease;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 140px;
    }

    .item-card:hover {
      transform: translate(-4px, -4px);
      box-shadow: 8px 8px 0px var(--shine-black);
    }

    .card-header {
      border-bottom: 2px solid var(--shine-black);
      padding-bottom: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .window-label {
      font-size: 12px;
      color: #333;
      background: #e0e0e0;
      padding: 2px 8px;
      border: 1px solid #999;
      margin-top: 5px;
      display: inline-block;
      font-weight: 700;
    }

    .bg-gray { background: #999 !important; color: white !important; }

    /* =========================================
       6. 財務表格
       ========================================= */
    .finance-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 3px solid var(--shine-black);
    }

    .finance-table th {
      background: var(--shine-black);
      color: var(--shine-lime);
      padding: 12px;
      text-align: left;
      font-weight: 900;
    }

    .finance-table td {
      border: 1px solid var(--shine-gray);
      padding: 10px;
      font-size: 14px;
    }

    .finance-table tr:hover:not(.group-header):not(.table-summary-row) {
      background: #fffde7;
      cursor: pointer;
    }

    .group-header {
      background: #e3f2fd !important;
      font-weight: 900;
      border-bottom: 2px solid var(--shine-black) !important;
      color: var(--shine-blue);
      cursor: pointer;
      transition: background 0.2s;
    }

    .group-header:hover { background: #d1e9ff !important; }

    .toggle-icon {
      display: inline-block;
      transition: transform 0.2s;
      margin-right: 10px;
      font-weight: bold;
    }

    .header-phone {
      margin-left: 15px;
      font-size: 12px;
      font-weight: normal;
      color: #666;
    }

    .table-summary-row {
      background-color: #f8f9fa !important;
      font-weight: bold;
      border-top: 2px solid var(--shine-black);
      border-bottom: 2px solid var(--shine-black);
    }

    .balance-red { color: var(--shine-red); font-weight: 900; }
    .balance-green { color: #2e7d32; font-weight: 900; }

    .note-cell {
      font-size: 11px;
      color: #666;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* =========================================
       7. 統計表格
       ========================================= */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
      gap: 24px;
    }

    .stats-card {
      background: white;
      border: 3px solid var(--shine-black);
      padding: 18px;
      box-shadow: 6px 6px 0px var(--shine-black);
      margin-bottom: 20px;
    }

    .stats-card h3 {
      font-weight: 900;
      margin-top: 0;
      border-bottom: 3px solid var(--shine-black);
      padding-bottom: 8px;
    }

    .stats-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
    .stats-table th, .stats-table td { border: 1px solid #ddd; padding: 10px 8px; text-align: center; }
    .stats-table th { background-color: var(--shine-black); color: var(--shine-lime); font-weight: 900; }
    .total-cell { background-color: #fff9c4 !important; font-weight: bold; }
    .row-label { text-align: left !important; background: #fdfdfd; font-weight: bold; }

    /* =========================================
       8. 徽章與標籤
       ========================================= */
    .badge {
      padding: 4px 8px;
      font-weight: 900;
      font-size: 12px;
      border: 1px solid var(--shine-black);
    }

    .bg-red { background: var(--shine-red); color: white; }
    .bg-green { background: var(--shine-lime); color: var(--shine-black); }
    .bg-yellow { background: var(--shine-yellow); color: var(--shine-black); }

    /* =========================================
       9. 搜尋列 / 批次狀態
       ========================================= */
    .search-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 15px;
      position: sticky;
      top: 0;
      background: #f0f0f0;
      z-index: 5;
      padding: 10px 0;
    }

    #list-search {
      padding: 12px 20px;
      border: 3px solid var(--shine-black);
      box-shadow: 6px 6px 0px var(--shine-black);
      font-weight: 900;
      font-size: 16px;
      font-family: "Inter", "Noto Sans TC", sans-serif;
    }

    #batch-status-bar {
      background: var(--shine-lime);
      border: 2px solid var(--shine-black);
      padding: 5px 15px;
      font-weight: 900;
    }

    #batch-summary-info {
      background: #fff9c4;
      padding: 15px;
      border: 3px dashed var(--shine-black);
      margin-bottom: 20px;
      font-weight: 900;
    }

    /* =========================================
       10. 清單佈局
       ========================================= */
    #section-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      width: 100%;
    }

    #section-list.finance-mode { display: block !important; }

    /* =========================================
       11. 彈窗 (editModal) 修正
       ========================================= */
    #editModal {
      padding: 40px 10px !important;
    }

    #editModal > .container {
      max-width: 900px !important;
      border: 4px solid var(--shine-black) !important;
      background: var(--shine-bg) !important;
      box-shadow: 20px 20px 0px var(--shine-black) !important;
      padding: 30px !important;
    }

    #editModal h2 {
      margin-bottom: 40px;
      font-size: 1.8em;
      border-bottom: 4px double var(--shine-black);
      padding-bottom: 10px;
    }

    #editModal .grid-row {
      display: grid !important;
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 15px 25px !important;
    }

    #editModal .form-group[style*="grid-column: 1 / -1"] {
      grid-column: span 2 !important;
    }

    #editModal .form-section {
      margin-bottom: 40px !important;
      position: relative;
    }

    #editModal .v-req:focus {
      border-color: var(--shine-lime);
      outline: none;
      box-shadow: 4px 4px 0px var(--shine-black);
    }

    /* 財務模組標題特殊色 */
    .finance-section-title {
      background: var(--shine-blue) !important;
      color: white !important;
      box-shadow: 4px 4px 0px var(--shine-blue) !important;
    }

    /* 備註區塊特殊色 */
    .note-section { background: #fff9c4 !important; border: 3px solid var(--shine-yellow) !important; }
    .note-section-title { background: var(--shine-yellow) !important; color: var(--shine-black) !important; box-shadow: 4px 4px 0px var(--shine-yellow) !important; }

    /* =========================================
       12. 載入遮罩
       ========================================= */
    .loading-mask {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.85);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.2em;
      border: 5px solid var(--shine-black);
    }

    .loading-mask::before {
      content: "⏳";
      margin-right: 10px;
      font-size: 1.5em;
    }

    /* =========================================
       13. 動畫
       ========================================= */
    .tab-content { animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake-red {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    /* =========================================
       14. 響應式
       ========================================= */
    @media (max-width: 700px) {
      #editModal .grid-row {
        grid-template-columns: 1fr !important;
      }
      #editModal .form-group[style*="grid-column: 1 / -1"] {
        grid-column: span 1 !important;
      }
      .stats-grid { grid-template-columns: 1fr; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="loading" class="loading-mask hidden">處理中 (PROCESSING)...</div>

  <!-- ==================== 登入區塊 ==================== -->
  <div id="auth-block" class="container" style="max-width: 500px; margin-top: 80px;">
    <div class="section-title">行政管理後台驗證</div>
    <div class="form-section">
      <div class="form-group">
        <label for="u_name">帳號</label>
        <input type="text" id="u_name" placeholder="請輸入帳號">
      </div>
      <div class="form-group" style="padding: 15px 0 0;">
        <label for="u_pass">密碼</label>
        <input type="password" id="u_pass" placeholder="請輸入密碼">
      </div>
      <button class="btn btn-next" style="width:100%; margin-top:10px;" onclick="doLogin()">登入驗證</button>
    </div>
  </div>

  <!-- ==================== 主後台介面 ==================== -->
  <div id="admin-dashboard" class="container hidden">
    <div class="section-title" id="dashboard-title">營會行政後台</div>

    <!-- 分頁切換 -->
    <div class="tab-container">
      <button class="tab-btn active" id="tab-edit" onclick="switchMainTab('edit')">資料編修</button>
      <button class="tab-btn" id="tab-finance" onclick="switchMainTab('finance')">繳費登記</button>
      <button class="tab-btn" id="tab-stats" onclick="switchMainTab('stats')">報名現況</button>
    </div>

    <!-- 搜尋區 -->
    <div id="search-section" class="form-section">
      <div class="section-title">快速檢索</div>
      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px;">
        <div>
          <label for="search-input">關鍵字搜尋</label>
          <input type="text" id="search-input" placeholder="搜尋姓名、電話、教會、團報窗口姓名..." oninput="handleSearch()">
        </div>
        <div>
          <label>目前筆數</label>
          <div id="stats-count" style="padding:12px; font-weight:900; border:2px solid var(--shine-black); background:white; margin-top:5px; text-align:center; box-shadow: 4px 4px 0px var(--shine-black);">0 筆</div>
        </div>
      </div>
    </div>

    <!-- 批次按鈕 -->
    <button id="btn-batch-edit" class="btn btn-batch" onclick="openBatchEdit()">
      ⚡ 批次登記選中項目 (<span id="selected-count">0</span>)
    </button>

    <!-- 卡片 / 財務清單 -->
    <div id="section-list" class="tab-content"></div>

    <!-- 統計分頁 -->
    <div id="section-stats" class="hidden tab-content">
      <div style="text-align: right; margin-bottom: 15px;">
        <button class="btn btn-next" onclick="refreshStats()">🔄 刷新數據</button>
      </div>
      <div id="stats-container" class="stats-grid">
        <div class="stats-card">正在彙整報名數據...</div>
      </div>
    </div>
  </div>

  <!-- ==================== 編輯彈窗 ==================== -->
  <div id="editModal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto;">
    <div class="container" style="max-width: 900px; margin: auto; position: relative;">
      <button onclick="closeModal()" style="position: absolute; right: 20px; top: 20px; background: var(--shine-red); color: white; border: 2px solid var(--shine-black); padding: 5px 15px; cursor: pointer; font-weight:900; font-size:1em;">關閉 X</button>
      <h2 style="text-align: center; font-weight: 900;">修改成員資料</h2>
      <input type="hidden" id="edit-row-index">

      <div id="modal-fields-container">
        <div id="batch-summary-info" class="hidden"></div>

        <!-- 個人資料 -->
        <div class="form-section">
          <div class="section-title">個人資料</div>
          <div class="grid-row">
            <div class="form-group"><label>姓名</label><input type="text" id="m-name" class="v-req"></div>
            <div class="form-group"><label>性別</label><select id="m-gender" class="v-req"><option>男</option><option>女</option></select></div>
            <div class="form-group"><label>生日</label><input type="date" id="m-birthday" class="v-req"></div>
            <div class="form-group"><label>手機</label><input type="tel" id="m-phone" class="v-req" oninput="formatPhone(this)"></div>
            <div class="form-group"><label>電子郵件</label><input type="email" id="m-email" class="v-req"></div>
          </div>
        </div>

        <!-- 參與身分 -->
        <div class="form-section">
          <div class="section-title">參與身分</div>
          <div class="grid-row">
            <div class="form-group"><label>報名身分</label><select id="m-role" class="v-req"><option>國中</option><option>高中職</option><option>大專</option><option>社青</option><option>傳道</option><option>牧師</option></select></div>
            <div class="form-group"><label>就讀學校</label><input type="text" id="m-school" class="v-req"></div>
            <div class="form-group"><label>升上年級</label><input type="text" id="m-grade" class="v-req"></div>
            <div class="form-group"><label>所屬教會</label><input type="text" id="m-church" class="v-req"></div>
            <div class="form-group"><label>是否為基督徒</label><select id="m-isChristian" class="v-req"><option>是</option><option>否</option></select></div>
            <div class="form-group"><label>是否已受洗</label><select id="m-isBaptized" class="v-req"><option>是</option><option>否</option></select></div>
          </div>
        </div>

        <!-- 緊急聯絡人 -->
        <div class="form-section">
          <div class="section-title">緊急聯絡人</div>
          <div class="grid-row">
            <div class="form-group"><label>緊急聯絡人</label><input type="text" id="m-iceName" class="v-req"></div>
            <div class="form-group"><label>緊急連絡人關係</label><input type="text" id="m-iceRel" class="v-req"></div>
            <div class="form-group"><label>緊急聯絡人電話</label><input type="tel" id="m-icePhone" class="v-req" oninput="formatPhone(this)"></div>
          </div>
        </div>

        <!-- 營會行政 -->
        <div class="form-section">
          <div class="section-title">營會行政</div>
          <div class="grid-row">
            <div class="form-group"><label>曾參加SHINE營會</label><select id="m-isAttended" class="v-req"><option>是</option><option>否</option></select></div>
            <div class="form-group"><label>飲食需求</label><select id="m-dietary" class="v-req"><option>葷食</option><option>蛋奶素</option><option>純素</option></select></div>
            <div class="form-group" style="grid-column: 1 / -1;"><label>特殊狀況與注意事項</label><input type="text" id="m-medical" class="v-req"></div>
            <div class="form-group"><label style="background: var(--shine-yellow)">取消報名</label><select id="m-status"><option value="">正常報名</option><option value="取消報名">取消報名</option></select></div>
          </div>
        </div>

        <!-- 資料異動備註 -->
        <div class="form-section note-section">
          <div class="section-title note-section-title">資料異動備註</div>
          <div class="form-group">
            <textarea id="m-adminNote" style="height: 60px;" placeholder="請輸入異動說明..."></textarea>
          </div>
        </div>
      </div>

      <!-- 財務登記模組 -->
      <div class="form-section" id="finance-module" style="background: #e3f2fd; border: 3px solid var(--shine-blue);">
        <div class="section-title finance-section-title">財務繳費登記</div>
        <div class="grid-row">
          <div class="form-group"><label>已繳金額</label><input type="number" id="m-paid"></div>
          <div class="form-group"><label>補助金額</label><input type="number" id="m-subsidy"></div>
          <div class="form-group">
            <label>繳費管道</label>
            <select id="m-payMethod">
              <option value="匯款">匯款</option>
              <option value="現金">現金</option>
              <option value="現場繳費">現場繳費</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-group"><label>收款人</label><input type="text" id="m-receiver"></div>
        <div class="form-group" style="grid-column: 1 / -1;"><label>繳費備註</label><input type="text" id="m-payNote"></div>
        </div>
      </div>

      <div style="text-align: center; margin-top: 30px; margin-bottom: 40px;">
        <button class="btn btn-next" onclick="submitEdit()">確認儲存修改</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwOylaunhUfkTLUygJqXj0En1qGwXBXg66c2Qk21Yb8KhwR3ybJvQ2GAbYegiZt1xc/exec";
    let fullData = [];
    let currentTab = 'edit';
    let searchTimer;
    let isModalDirty = false;
    let batchSelectedRows = [];
    let currentDisplayData = [];
    let currentPage = 1;
    const pageSize = 20; // 每頁顯示 20 張
    let originalData = {};

    // --- API 核心 ---
    async function api(payload) {
      document.getElementById('loading').classList.remove('hidden');
      try {

    function handleSearch() {

             (m.phone && m.phone.includes(key)) || // 手機號碼
             (m.church && m.church.toLowerCase().includes(key)) ||

    });

    const statsEl = document.getElementById('stats-count');
    if (statsEl) statsEl.innerText = `${filtered.length} 筆`;
    
    renderList(filtered);
  }, 250); // 稍微增加延遲，對 1000 筆資料更友善
}

    // --- 排序 ---
    function sortData(data) {
      return [...data].sort((a, b) => {
        const winA = (a.contactName || "").trim();
        const winB = (b.contactName || "").trim();
        if (!winA && winB) return -1;
        if (!winB && winA) return 1;
        if (winA !== winB) return winA.localeCompare(winB);
        const churchA = (a.church || "").trim();
        const churchB = (b.church || "").trim();
        if (churchA !== churchB) return churchA.localeCompare(churchB);
        return a.name.localeCompare(b.name);
      });
    }

 * @param {boolean} isPaging - 是否為翻頁觸發（預設為 false，即重新搜尋）
 */
function filterAndRender(isPaging = false) {
  // 1. 只有在「不是翻頁」的情況下（即：手動輸入關鍵字時），才重置回第一頁
  if (isPaging !== true) {
    currentPage = 1; 
  }

  // 2. 獲取搜尋關鍵字
  const searchInput = document.getElementById('list-search');
  const searchTerm = (searchInput?.value || "").toLowerCase();
  
  // 3. 從 fullData 進行過濾
  const filtered = fullData.filter(m => 
    (m.name || "").toLowerCase().includes(searchTerm) || 
    (m.church || "").toLowerCase().includes(searchTerm) || 
    (m.contactName || "").toLowerCase().includes(searchTerm)
  );

  // 4. 丟給 renderList 進行排序、裁切與顯示
  renderList(filtered);
}

  filterAndRender(true);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

    async function submitEdit() {

      const m = fullData.find(x => String(x.row) === id);

      if (compareNew !== oldVal) {
        // 尋找對應的 Label 名稱
        const label = el?.closest('.form-group')?.querySelector('label')?.innerText || f;
        changeLogs.push(`${label}: [${oldVal || '空'}] ➡️ [${compareNew || '空'}]`);
      }
    }
  });

  // 獲取當前輸入的異動原因
  const userReason = document.getElementById('m-adminNote').value.trim();

  // 核心檢查：如果有改東西但沒寫原因
  if (changeLogs.length > 0) {
    if (!userReason) {
      alert("⚠️ 偵測到資料有變動，請在「資料異動備註」輸入更新原因以記錄軌跡。");
      document.getElementById('m-adminNote').focus();
      document.getElementById('m-adminNote').style.border = "2px solid var(--shine-red)";
      return;
    }

    // 產生並追加軌跡文字
    const now = new Date().toLocaleString('zh-TW', { hour12: false });
    const traceEntry = `\n--- 📅 ${now} (${adminName}) ---\n🔍 變動：${changeLogs.join(', ')}\n📝 原因：${userReason}\n`;
    updateData['adminNote'] = (originalData.adminNote || "") + traceEntry;
  } else {
    // 沒變動則維持原本紀錄
    updateData['adminNote'] = originalData.adminNote || "";
  }

  // --- 4. 送出資料 ---
  const res = await api({ 
    action: 'updateParticipant', 
    token: sessionStorage.getItem('admin_token'), 
    row: rowId, 
    data: updateData, 
    adminName: adminName 
  });

  if (res && res.success) { 
    alert("✅ 資料已同步並記錄異動軌跡！"); 
    isModalDirty = false; 
    closeModal(); 
    fetchData(); 
  }
}

    // --- 統計 ---
    async function refreshStats() {
      const container = document.getElementById('stats-container');
      container.innerHTML = '<div class="stats-card">計算中...</div>';
      const res = await api({ action: 'getRegistrationStats', token: sessionStorage.getItem('admin_token') });
      if (res && res.success) renderStatsDashboard(res.data);
    }

    function renderStatsDashboard(data) {
      const container = document.getElementById('stats-container');
      container.innerHTML = '';
      const configs = [
        { title: "👫 性別 × 報名管道", key: "gender" },
        { title: "🎓 報名身分 × 報名管道", key: "role" },
        { title: "✝️ 基督徒 × 報名管道", key: "christian" },
        { title: "⛪ 所屬教會 × 報名管道", key: "church" }
      ];
      configs.forEach(conf => {
        if (data[conf.key]) {
          const card = document.createElement('div');
          card.className = 'stats-card';
          card.innerHTML = `<h3>${conf.title}</h3>` + createTableHtml(data.channels, data[conf.key]);
          container.appendChild(card);
        }
      });
    }

    function createTableHtml(channels, groupData) {
      let html = `<table class="stats-table"><thead><tr><th>類別</th>`;
      channels.forEach(ch => html += `<th>${ch}</th>`);
      html += `<th class="total-cell">小計</th></tr></thead><tbody>`;
      let grandTotal = 0;
      let colTotals = {};
      Object.keys(groupData).sort().forEach(label => {
        let rowSum = 0;
        html += `<tr><td class="row-label">${label}</td>`;
        channels.forEach(ch => {
          const val = groupData[label][ch] || 0;
          html += `<td>${val}</td>`;
          rowSum += val;
          colTotals[ch] = (colTotals[ch] || 0) + val;
        });
        html += `<td class="total-cell">${rowSum}</td></tr>`;
        grandTotal += rowSum;
      });
      html += `</tbody><tfoot><tr class="total-cell"><td>總計</td>`;
      channels.forEach(ch => html += `<td>${colTotals[ch] || 0}</td>`);
      html += `<td>${grandTotal}</td></tr></tfoot></table>`;
      return html;
    }

    // --- 工具函式 ---
    function formatPhone(obj) {
      let val = obj.value.replace(/\D/g, '');
      if (val.length > 10) val = val.slice(0, 10);
      if (val.length > 4) obj.value = val.slice(0, 4) + '-' + val.slice(4);
      else obj.value = val;
    }

    function attachModalListener() {
      const modal = document.getElementById('editModal');
      if (!modal.dataset.listenerAttached) {
        modal.addEventListener('change', (e) => {
          if (e.target.matches('input, select, textarea')) isModalDirty = true;
        });
        modal.dataset.listenerAttached = "true";
      }
    }

    window.addEventListener('beforeunload', (e) => {
      if (isModalDirty) { e.preventDefault(); e.returnValue = ''; }
    });
  </script>
</body>
</html>
