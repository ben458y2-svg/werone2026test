<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WE R ONE 2026 報名行政管理後台</title>
  <style>
    :root {
      --shine-lime: #00ff7f; --shine-black: #1a1a1a;
      --shine-bg: #ffffff; --shine-light: #f4f7f5;
      --shine-gray: #d1d1d1; --shine-red: #ff4d4d;
      --shine-yellow: #fbc02d; --shine-blue: #2196f3;
    }
    
    body { font-family: "Inter", "Noto Sans TC", sans-serif; background-color: #f0f0f0; margin: 0; padding: 10px; }

    .container {
      max-width: 1300px; margin: 20px auto; background: var(--shine-bg);
      padding: clamp(20px, 4vw, 40px); border: 3px solid var(--shine-black);
      box-shadow: 12px 12px 0px var(--shine-black); box-sizing: border-box;
      position: relative;
    }

    /* --- 分頁切換區 (對齊團報樣式) --- */
    .main-tabs { 
      display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; 
    }
    .tab-btn { 
      flex: 1; min-width: 120px; padding: 15px; font-weight: 900; 
      border: 2px solid var(--shine-black); cursor: pointer; 
      background: var(--shine-bg); color: var(--shine-black); 
      transition: all 0.1s ease; text-transform: uppercase;
      display: inline-flex; align-items: center; justify-content: center;
    }
    /* 套用團報 .btn-next:hover & .active 邏輯 */
    .tab-btn:hover, .tab-btn.active { 
      background: var(--shine-black); 
      color: var(--shine-lime); 
      box-shadow: 6px 6px 0px var(--shine-black); 
      transform: translate(-3px, -3px); 
    }

    /* --- 核心清單佈局控制 --- */
    #section-list {
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px; width: 100%;
    }
    #section-list.finance-mode { display: block !important; }

    /* --- 資料編修卡片 --- */
    .item-card { 
      background: var(--shine-bg); border: 3px solid var(--shine-black); 
      padding: 15px; cursor: pointer; transition: all 0.1s ease; 
      display: flex; flex-direction: column; justify-content: space-between;
      min-height: 150px;
    }
    .item-card:hover { transform: translate(-4px, -4px); box-shadow: 8px 8px 0px var(--shine-black); }
    
    .window-label {
      font-size: 12px; color: #333; background: var(--shine-lime);
      padding: 2px 8px; border: 1px solid #000; margin-top: 10px;
      display: inline-block; font-weight: 700;
    }

    /* --- 財務專用表格樣式 --- */
    .finance-table { width: 100%; border-collapse: collapse; background: white; border: 3px solid var(--shine-black); }
    .finance-table th { background: var(--shine-black); color: var(--shine-lime); padding: 12px; text-align: left; }
    .finance-table td { border: 1px solid var(--shine-gray); padding: 12px; font-size: 14px; }
    .finance-table tr:hover:not(.group-header):not(.table-summary-row) { background: #fffde7; cursor: pointer; }
    
    .group-header { background: #e3f2fd !important; font-weight: 900; border-bottom: 2px solid var(--shine-black) !important; color: var(--shine-blue); }
    .table-summary-row { background-color: #fafafa !important; font-weight: bold; border-top: 2px solid var(--shine-black); border-bottom: 3px solid var(--shine-black); }

    /* --- 動作按鈕 --- */
    .btn-save-action {
      width: 100%; background: var(--shine-red) !important; color: white !important;
      border: 2px solid var(--shine-black); box-shadow: 6px 6px 0px var(--shine-black);
      font-size: 1.2em; font-weight: 900; padding: 15px; cursor: pointer;
      transition: all 0.1s ease;
    }
    .btn-save-action:active { transform: translate(2px, 2px); box-shadow: 4px 4px 0px var(--shine-black); }

    .btn-batch { background: var(--shine-yellow); color: black; border: 2px solid #000; font-weight: 900; padding: 10px 20px; cursor: pointer; margin-bottom: 10px; }
    
    .balance-red { color: var(--shine-red); font-weight: 900; }
    .balance-green { color: #2e7d32; font-weight: 900; }
    .badge { padding: 4px 8px; font-weight: 900; font-size: 12px; border: 1px solid black; }
    .bg-red { background: var(--shine-red); color: white; }
    .bg-green { background: var(--shine-lime); color: black; }
    .bg-yellow { background: var(--shine-yellow); color: black; }
    .hidden { display: none !important; }
</style>
</head>
<body>

  <div id="loading" class="loading-mask hidden">處理中 (PROCESSING)...</div>

  <div id="auth-block" class="container" style="max-width: 500px; margin-top: 80px;">
    <div class="section-title">行政管理後台</div>
    <div class="form-section">
      <div class="form-group"><label for="u_name">帳號</label><input type="text" id="u_name"></div>
      <div class="form-group"><label for="u_pass">密碼</label><input type="password" id="u_pass"></div>
      <button class="btn btn-next" style="width:100%; margin-top:10px;" onclick="doLogin()">登入驗證</button>
    </div>
  </div>

  <div id="admin-dashboard" class="container hidden">
    <div class="section-title" id="dashboard-title">營會行政後台</div>
    
    <div class="main-tabs">
      <button class="tab-btn active" id="tab-edit" onclick="switchMainTab('edit')">📝 資料編修</button>
      <button class="tab-btn" id="tab-finance" onclick="switchMainTab('finance')">💰 繳費登記</button>
      <button class="tab-btn" id="tab-stats" onclick="switchMainTab('stats')">📊 報名現況</button>
    </div>

    <div id="search-section" class="form-section">
      <div class="section-title">快速檢索</div>
      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px;">
        <div>
          <label for="search-input">關鍵字搜尋</label>
          <input type="text" id="search-input" placeholder="搜尋姓名、電話、教會..." oninput="handleSearch()">
        </div>
        <div>
          <label>目前筆數</label>
          <div id="stats-count" style="padding:12px; font-weight:900; border:2px solid black; background:white; margin-top:5px; text-align:center;">0</div>
        </div>
      </div>
    </div>

    <button id="btn-batch-edit" class="btn btn-batch" onclick="openBatchEdit()">⚡ 批次登記選中項目 (<span id="selected-count">0</span>)</button>

    <div id="section-list" class="grid-display-area"></div>

    <div id="section-stats" class="hidden">
      <div style="text-align: right; margin-bottom: 15px;">
        <button class="btn" onclick="refreshStats()">🔄 刷新數據</button>
      </div>
      <div id="stats-container" class="stats-grid">
        <div class="loading-placeholder">正在彙整報名數據...</div>
      </div>
    </div>
  </div>

  <div id="editModal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; padding: 20px 0;">
    <div class="container" style="max-width: 900px; margin: auto;">
      <button onclick="closeModal()" style="position: absolute; right: 20px; top: 20px; background: var(--shine-red); color: white; border: 2px solid black; padding: 5px 15px; cursor: pointer; font-weight:900;">CLOSE X</button>
      <h2 style="text-align: center; font-weight: 900; margin-bottom:30px;">編輯詳細資料</h2>
      <input type="hidden" id="edit-row-index">
      
      <div id="modal-fields-container">
        <div id="batch-summary-info" class="hidden"></div>

        <div class="form-section">
          <div class="section-title">個人資料</div>
          <div class="grid-row">
            <div class="form-group"><label for="m-name">姓名</label><input type="text" id="m-name" class="v-req"></div>
            <div class="form-group"><label for="m-gender">性別</label><select id="m-gender" class="v-req"><option>男</option><option>女</option></select></div>
            <div class="form-group"><label for="m-birthday">生日</label><input type="date" id="m-birthday" class="v-req"></div>
            <div class="form-group"><label for="m-phone">手機</label><input type="tel" id="m-phone" class="v-req" oninput="formatPhone(this)"></div>
            <div class="form-group"><label for="m-email">電子郵件</label><input type="email" id="m-email" class="v-req"></div>
          </div>
        </div>

        <div class="form-section">
          <div class="section-title">參與身分</div>
          <div class="grid-row">
            <div class="form-group"><label for="m-role">報名身分</label><select id="m-role" class="v-req"><option>國中</option><option>高中職</option><option>大專</option><option>社青</option><option>傳道</option><option>牧師</option></select></div>
            <div class="form-group"><label for="m-school">就讀學校</label><input type="text" id="m-school" class="v-req"></div>
            <div class="form-group"><label for="m-grade">升上年級</label><input type="text" id="m-grade" class="v-req"></div>
            <div class="form-group"><label for="m-church">所屬教會</label><input type="text" id="m-church" class="v-req"></div>
            <div class="form-group"><label for="m-isChristian">是否為基督徒</label><select id="m-isChristian" class="v-req"><option>是</option><option>否</option></select></div>
            <div class="form-group"><label for="m-isBaptized">是否已受洗</label><select id="m-isBaptized" class="v-req"><option>是</option><option>否</option></select></div>
          </div>
        </div>

        <div class="form-section">
          <div class="section-title">緊急聯絡人</div>
          <div class="grid-row">
            <div class="form-group"><label for="m-iceName">緊急聯絡人</label><input type="text" id="m-iceName" class="v-req"></div>
            <div class="form-group"><label for="m-iceRel">緊急連絡人關係</label><input type="text" id="m-iceRel" class="v-req"></div>
            <div class="form-group"><label for="m-icePhone">緊急聯絡人電話</label><input type="tel" id="m-icePhone" class="v-req" oninput="formatPhone(this)"></div>
          </div>
        </div>

        <div class="form-section">
          <div class="section-title">營會行政</div>
          <div class="grid-row">
            <div class="form-group"><label for="m-isAttended">曾參加SHINE營會</label><select id="m-isAttended" class="v-req"><option>是</option><option>否</option></select></div>
            <div class="form-group"><label for="m-dietary">飲食需求</label><select id="m-dietary" class="v-req"><option>葷食</option><option>蛋奶素</option><option>純素</option></select></div>
            <div class="form-group" style="grid-column: 1 / -1;"><label for="m-medical" >特殊狀況與注意事項</label><input type="text" id="m-medical" class="v-req"></div>
          </div>
        </div>

        <div class="form-section" style="background: #fff9c4; border: 3px solid var(--shine-yellow);">
          <div class="section-title" style="background: var(--shine-yellow); color: black;">資料異動備註</div>
          <div class="form-group">
            <textarea id="m-adminNote" style="height: 60px;" placeholder="請輸入異動說明..."></textarea>
          </div>
        </div>
      </div>

      <div class="form-section" id="finance-module" style="background: #e3f2fd; border: 3px solid #2196f3;">
        <div class="section-title" style="background: #2196f3; color: white;">💰 財務繳費登記</div>
        <div class="grid-row">
          <div class="form-group"><label>報名狀態</label>
            <select id="m-status">
              <option value="尚未繳費">尚未繳費</option>
              <option value="已繳訂金">已繳訂金</option>
              <option value="已繳全額">已繳全額</option>
              <option value="已退費">已退費</option>
            </select>
          </div>
          <div class="form-group"><label>已繳金額</label><input type="number" id="m-paid"></div>
          <div class="form-group"><label>補助金額</label><input type="number" id="m-subsidy"></div>
          <div class="form-group"><label>繳費管道</label>
            <select id="m-payMethod">
              <option value="匯款">匯款</option>
              <option value="現金">現金</option>
              <option value="現場繳費">現場繳費</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-group"><label>收款人</label><input type="text" id="m-receiver"></div>
        </div>
        <div class="form-group"><label>繳費備註</label><input type="text" id="m-payNote"></div>
      </div>

      <div style="text-align: center; margin-top: 30px; margin-bottom: 40px;">
        <button class="btn btn-next" onclick="submitEdit()">儲存變更紀錄</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwOylaunhUfkTLUygJqXj0En1qGwXBXg66c2Qk21Yb8KhwR3ybJvQ2GAbYegiZt1xc/exec"; 
    let fullData = [];
    let currentTab = 'edit';
    let searchTimer;
    let isModalDirty = false;
    let batchSelectedRows = []; // 儲存批次勾選的 row IDs

    // --- API 核心 ---
    async function api(payload) {
      document.getElementById('loading').classList.remove('hidden');
      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        return await res.json();
      } catch(e) {
        alert("連線超時或錯誤，請檢查後端部署版本");
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    // --- 登入 ---
    async function doLogin() {
      const u = document.getElementById('u_name').value;
      const p = document.getElementById('u_pass').value;
      const res = await api({ action: 'login', username: u, password: p });
      if (res && res.success) {
        sessionStorage.setItem('admin_token', res.token);
        sessionStorage.setItem('admin_name', res.userName); 
        document.getElementById('auth-block').classList.add('hidden');
        document.getElementById('admin-dashboard').classList.remove('hidden');
        document.getElementById('dashboard-title').innerText = `ADMIN: ${res.userName}`;
        fetchData();
        attachModalListener();
      } else {
        alert("驗證失敗");
      }
    }

    async function fetchData() {
      const res = await api({ action: 'fetchAllData', token: sessionStorage.getItem('admin_token') });
      if (res && res.success) {
        fullData = res.data;
        handleSearch();
      }
    }

    function switchMainTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      
      const isStats = (tab === 'stats');
      document.getElementById('search-section').classList.toggle('hidden', isStats);
      document.getElementById('section-list').classList.toggle('hidden', isStats);
      document.getElementById('section-stats').classList.toggle('hidden', !isStats);
      
      // 批次按鈕隱藏重設
      updateBatchUI();

      if (isStats) refreshStats(); else handleSearch();
    }

    function handleSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        const key = document.getElementById('search-input').value.toLowerCase();
        let filtered = fullData.filter(m => 
          (m.name && m.name.toLowerCase().includes(key)) ||
          (m.phone && m.phone.includes(key)) ||
          (m.church && m.church.toLowerCase().includes(key)) ||
          (m.group && m.group.toLowerCase().includes(key))
        );
        document.getElementById('stats-count').innerText = `${filtered.length} 筆`;
        renderList(filtered);
      }, 200);
    }


    // --- 5. 排序邏輯：個人報名最前，團體按窗口聚集 ---
    function sortData(data) {
      return data.sort((a, b) => {
        // a 為個人報名 (group 為空)，b 為團體 -> a 前移
        if (!a.group && b.group) return -1;
        if (a.group && !b.group) return 1;
        // 皆為團體時，按 group 名稱排序 (窗口聚集)
        if (a.group !== b.group) return (a.group || "").localeCompare(b.group || "");
        // 同一窗口內按姓名排
        return a.name.localeCompare(b.name);
      });
    }
    
    // --- 渲染清單 (分組邏輯) ---
    // --- 渲染清單 (包含模式判斷與 1, 2, 3, 4, 5 項修正) ---
    function renderList(data) {
      const container = document.getElementById('section-list');
      const sorted = sortData(data); // 執行第 5 項排序修正

      if (currentTab === 'finance') {
        container.classList.add('finance-mode'); // 解決 CSS 佈局問題
        
        let html = `
          <table class="finance-table">
            <thead>
              <tr>
                <th style="width:40px;"><input type="checkbox" onchange="selectAll(this)"></th>
                <th>姓名 / 教會</th>
                <th>狀態 / 備註</th>
                <th>應收 / 補助 / 已繳</th>
                <th>待繳餘額</th>
              </tr>
            </thead>
            <tbody>`;
        
        let lastGroup = null;
        let groupTotalDue = 0, groupTotalPaid = 0, groupTotalSubsidy = 0;
        let groupRows = [];

        // 輔助函式：渲染團體總計列
        const renderSummary = (due, paid, sub) => `
          <tr class="table-summary-row">
            <td colspan="3" style="text-align:right;">📦 本次對帳總計：</td>
            <td>$${due} / $${sub} / <span style="color:blue;">$${paid}</span></td>
            <td class="${(due-paid-sub) > 0 ? 'balance-red' : 'balance-green'}">$${due - paid - sub}</td>
          </tr>`;

        sorted.forEach((m, index) => {
          const currentGroup = m.group || "個人報名";
          const balance = (m.totalDue || 0) - (m.paid || 0) - (m.subsidy || 0);

          // 偵測到新組別，且不是第一筆，渲染上一組的總計
          if (lastGroup !== null && currentGroup !== lastGroup && lastGroup !== "個人報名") {
            html += renderSummary(groupTotalDue, groupTotalPaid, groupTotalSubsidy);
            groupTotalDue = 0; groupTotalPaid = 0; groupTotalSubsidy = 0;
          }

          // 渲染組別標頭
          if (currentGroup !== lastGroup) {
            const isIndividual = currentGroup === "個人報名";
            html += `
              <tr class="group-header">
                <td colspan="5" style="padding:10px; background:#e3f2fd;">
                  ${isIndividual ? '📍 個人報名' : '📦 團體：' + currentGroup}
                  ${!isIndividual ? `<span style="margin-left:15px; font-size:12px; font-weight:normal; color:#444;">👤 窗口：${m.contactName || '未填'} | 📱 ${m.contactPhone || '-'}</span>` : ''}
                </td>
              </tr>`;
            lastGroup = currentGroup;
          }

          // 累加團體統計
          if (currentGroup !== "個人報名") {
            groupTotalDue += Number(m.totalDue || 0);
            groupTotalPaid += Number(m.paid || 0);
            groupTotalSubsidy += Number(m.subsidy || 0);
          }

          html += `
            <tr onclick="openAction(${m.row})">
              <td onclick="event.stopPropagation()"><input type="checkbox" class="row-checkbox" value="${m.row}" onchange="updateBatchUI()"></td>
              <td><strong>${m.name}</strong><br><small>${m.church || ''}</small></td>
              <td>
                <span class="badge ${balance <= 0 ? 'bg-green' : (m.paid > 0 ? 'bg-yellow' : 'bg-red')}">${m.status}</span>
                <div style="font-size:11px; color:#666; margin-top:4px;">📝 ${m.payNote || '無備註'}</div>
              </td>
              <td>${m.totalDue} / ${m.subsidy} / <span style="color:blue;">${m.paid}</span></td>
              <td class="${balance > 0 ? 'balance-red' : 'balance-green'}">$${balance}</td>
            </tr>`;
            
          // 最後一筆處理
          if (index === sorted.length - 1 && currentGroup !== "個人報名") {
            html += renderSummary(groupTotalDue, groupTotalPaid, groupTotalSubsidy);
          }
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
      } else {
        // --- 資料編修模式 (第 2 項修正：移除標籤，改顯示窗口) ---
        container.classList.remove('finance-mode');
        container.innerHTML = sorted.map(m => `
          <div class="item-card" onclick="openAction(${m.row})">
            <div>
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <strong style="font-size:1.1em;">${m.name}</strong>
                <span style="font-size:12px; color:#666;">#${m.row}</span>
              </div>
              <div style="font-size:13px; margin-top:8px;">
                <div>⛪ ${m.church || '未填教會'}</div>
                <div style="color:#666;">📱 ${m.phone}</div>
                <div class="window-label">👤 窗口：${m.contactName || (m.group ? m.group : '個人')}</div>
              </div>
            </div>
            <div style="border-top: 1px solid #eee; margin-top:10px; padding-top:8px; font-size:12px; text-align:right;">
               <span class="${(m.totalDue - m.paid - m.subsidy) > 0 ? 'balance-red' : 'balance-green'}">
                 餘額：$${m.totalDue - m.paid - m.subsidy}
               </span>
            </div>
          </div>
        `).join('');
      }
    }
    // --- 批次功能 ---
    function updateBatchUI() {
      const selected = document.querySelectorAll('.row-checkbox:checked');
      const btn = document.getElementById('btn-batch-edit');
      btn.style.display = (currentTab === 'finance' && selected.length > 0) ? 'inline-flex' : 'none';
      document.getElementById('selected-count').innerText = selected.length;
    }

    function selectAll(master) {
      document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = master.checked);
      updateBatchUI();
    }

    function openBatchEdit() {
      batchSelectedRows = Array.from(document.querySelectorAll('.row-checkbox:checked')).map(cb => cb.value);
      if (batchSelectedRows.length === 0) return;

      // 計算財務匯總
      let totalDue = 0, totalPaid = 0, totalBalance = 0;
      batchSelectedRows.forEach(id => {
        const m = fullData.find(x => String(x.row) === id);
        if (m) {
          totalDue += Number(m.totalDue || 0);
          totalPaid += Number(m.paid || 0);
          totalBalance += (Number(m.totalDue || 0) - Number(m.paid || 0) - Number(m.subsidy || 0));
        }
      });

      // UI 調整
      document.getElementById('edit-row-index').value = "BATCH";
      document.querySelectorAll('#modal-fields-container .form-section').forEach(sec => sec.classList.add('hidden'));
      document.getElementById('finance-module').classList.remove('hidden');
      
      const summary = document.getElementById('batch-summary-info');
      summary.classList.remove('hidden');
      summary.innerHTML = `
        <div style="font-size:1.1em; color:var(--shine-blue); border-bottom:2px solid #000; padding-bottom:5px; margin-bottom:10px;">📊 批次統計：選中 ${batchSelectedRows.length} 人</div>
        <div style="display:flex; justify-content:space-between;"><span>應繳總額：</span><span>$${totalDue}</span></div>
        <div style="display:flex; justify-content:space-between; color:red;"><span>待繳餘額：</span><span>$${totalBalance}</span></div>
        <div style="margin-top:10px; background:#fff; padding:8px; border:1px solid #000; font-size:13px; font-weight:normal;">
          💡 <strong>寫入規則：</strong> 下方填寫的金額會【分別套用】給每個人。<br>
          例如填寫 1500，這 ${batchSelectedRows.length} 人每個人都會被記錄已繳 1500。
        </div>
      `;

      // 清空預設值
      document.getElementById('m-status').value = "已繳全額";
      document.getElementById('m-paid').value = ""; // 強制留空
      document.getElementById('m-payNote').value = "團體批次繳費";
      document.getElementById('m-receiver').value = sessionStorage.getItem('admin_name');

      document.querySelector('#editModal h2').innerText = "⚡ 批次繳費登記";
      document.getElementById('editModal').classList.remove('hidden');
      isModalDirty = false;
    }

    // --- 單人編輯開啟 ---
    function openAction(rowId) {
      const m = fullData.find(item => item.row === rowId);
      if (!m) return;

      document.getElementById('edit-row-index').value = m.row;
      document.getElementById('batch-summary-info').classList.add('hidden');
      
      // 填入所有欄位
      const fields = ['name','gender','birthday','phone','email','role','school','grade','church','isChristian','isBaptized','iceName','iceRel','icePhone','isAttended','dietary','medical','adminNote','status','paid','subsidy','payMethod','receiver','payNote'];
      fields.forEach(f => {
        const el = document.getElementById('m-' + f);
        if (el) el.value = m[f] || (el.tagName === 'SELECT' ? el.options[0].value : "");
      });

      // 根據分頁顯示區塊
      const allSections = document.querySelectorAll('#modal-fields-container .form-section');
      const financeSec = document.getElementById('finance-module');
      if (currentTab === 'finance') {
        allSections.forEach(s => s.classList.add('hidden'));
        financeSec.classList.remove('hidden');
      } else {
        allSections.forEach(s => s.classList.remove('hidden'));
      }

      document.querySelector('#editModal h2').innerText = `📝 編輯：${m.name}`;
      document.getElementById('editModal').classList.remove('hidden');
      isModalDirty = false;
    }

    function closeModal() {
      if (isModalDirty && !confirm("尚未儲存，確定關閉？")) return;
      document.getElementById('editModal').classList.add('hidden');
    }

    // --- 儲存實作 ---
    async function submitEdit() {
      const rowId = document.getElementById('edit-row-index').value;
      const inputPaid = document.getElementById('m-paid').value;

      // 批次模式邏輯
      if (rowId === "BATCH") {
        if (!inputPaid || Number(inputPaid) <= 0) {
          alert("❌ 批次模式下必須填寫「已繳金額」。若不改動金額請關閉後個別編輯。");
          return;
        }

        if (!confirm(`確定要將這 ${batchSelectedRows.length} 位成員，每位都登記已繳 $${inputPaid} 元嗎？`)) return;

        const updates = batchSelectedRows.map(id => {
          const m = fullData.find(x => String(x.row) === id);
          return {
            row: id,
            data: { 
              ...m, 
              status: document.getElementById('m-status').value,
              paid: Number(inputPaid),
              subsidy: Number(document.getElementById('m-subsidy').value || 0),
              payMethod: document.getElementById('m-payMethod').value,
              payNote: document.getElementById('m-payNote').value,
              receiver: document.getElementById('m-receiver').value,
              adminNote: (m.adminNote || "") + " [批次更新]"
            }
          };
        });

        const res = await api({ action: 'batchUpdate', token: sessionStorage.getItem('admin_token'), updates, adminName: sessionStorage.getItem('admin_name') });
        if (res.success) { alert("✅ 批次更新成功"); closeModal(); fetchData(); }
        return;
      }

      // 單人模式邏輯 (僅檢查可見的必填項)
      const reqs = Array.from(document.querySelectorAll('#editModal .v-req')).filter(el => el.offsetParent !== null);
      let missing = [];
      reqs.forEach(el => {
        if (!el.value.trim() && el.id !== 'm-medical') {
          missing.push(el.closest('.form-group').querySelector('label').innerText);
          el.style.border = "2px solid red";
        } else { el.style.border = "2px solid black"; }
      });

      if (missing.length > 0) { alert("未填必填項：" + missing.join(", ")); return; }

      const updateData = {};
      const allFields = ['name','gender','birthday','phone','email','role','school','grade','church','isChristian','isBaptized','iceName','iceRel','icePhone','isAttended','dietary','medical','adminNote','status','paid','subsidy','payMethod','receiver','payNote'];
      allFields.forEach(f => updateData[f] = document.getElementById('m-' + f).value);

      const res = await api({ action: 'updateParticipant', token: sessionStorage.getItem('admin_token'), row: rowId, data: updateData, adminName: sessionStorage.getItem('admin_name') });
      if (res.success) { alert("✅ 資料已同步"); isModalDirty = false; closeModal(); fetchData(); }
    }

    // --- 統計 ---
    async function refreshStats() {
      const container = document.getElementById('stats-container');
      container.innerHTML = '<div class="stats-card">計算中...</div>';
      const res = await api({ action: 'getRegistrationStats', token: sessionStorage.getItem('admin_token') });
      if (res && res.success) renderStatsDashboard(res.data);
    }

    function renderStatsDashboard(data) {
      const container = document.getElementById('stats-container');
      container.innerHTML = '';
      const configs = [
        { title: "👫 性別 - 報名管道", key: "gender" },
        { title: "🎓 報名身分 - 報名管道", key: "role" },
        { title: "✝️ 基督徒 - 報名管道", key: "christian" },
        { title: "⛪ 所屬教會 - 報名管道", key: "church" }
      ];
      configs.forEach(conf => {
        if (data[conf.key]) {
          const card = document.createElement('div');
          card.className = 'stats-card';
          card.innerHTML = `<h3>${conf.title}</h3>` + createTableHtml(data.channels, data[conf.key]);
          container.appendChild(card);
        }
      });
    }

    function createTableHtml(channels, groupData) {
      let html = `<table class="stats-table"><thead><tr><th>類別</th>`;
      channels.forEach(ch => html += `<th>${ch}</th>`);
      html += `<th class="total-cell">小計</th></tr></thead><tbody>`;
      let grandTotal = 0;
      let colTotals = {};
      Object.keys(groupData).sort().forEach(label => {
        let rowSum = 0;
        html += `<tr><td class="row-label">${label}</td>`;
        channels.forEach(ch => {
          const val = groupData[label][ch] || 0;
          html += `<td>${val}</td>`;
          rowSum += val;
          colTotals[ch] = (colTotals[ch] || 0) + val;
        });
        html += `<td class="total-cell">${rowSum}</td></tr>`;
        grandTotal += rowSum;
      });
      html += `</tbody><tfoot><tr class="total-cell"><td>總計</td>`;
      channels.forEach(ch => html += `<td>${colTotals[ch] || 0}</td>`);
      html += `<td>${grandTotal}</td></tr></tfoot></table>`;
      return html;
    }

    function formatPhone(obj) {
      let val = obj.value.replace(/\D/g, ''); 
      if (val.length > 4) obj.value = val.slice(0, 4) + '-' + val.slice(4, 10);
      else obj.value = val;
    }
    function attachModalListener() {
      document.getElementById('editModal').addEventListener('change', () => isModalDirty = true);
    }
  </script>
</body>
</html>
